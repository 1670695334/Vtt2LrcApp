plugins {
    id 'com.android.application'
}

android {
    namespace 'com.qilong.vtt2lrc'
    compileSdk 35

    defaultConfig {
        applicationId 'com.qilong.vtt2lrc'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.documentfile:documentfile:1.0.1'
}
